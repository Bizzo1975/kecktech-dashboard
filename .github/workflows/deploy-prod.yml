name: Deploy to Prod — kecktech.net

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to prod-dashboard-01 (VMID 230)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/docker/dashboard

            echo "==> Pulling latest main branch..."
            git pull origin main

            echo "==> Installing website dependencies..."
            cd dashboard/website && npm ci --omit=dev && cd ../..

            echo "==> Building Astro site (uses data files on VM)..."
            cd dashboard/website && npm run build && cd ../..

            echo "==> Rebuilding admin container..."
            cd dashboard && docker compose build kecktech-admin && cd ..

            echo "==> Restarting admin + web containers..."
            cd dashboard && docker compose up -d kecktech-admin && cd ..
            docker exec kecktech-web nginx -s reload 2>/dev/null || docker restart kecktech-web

            echo "==> Deploy complete. Running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep kecktech
