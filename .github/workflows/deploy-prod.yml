name: Deploy to Prod — kecktech.net

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/website/**'
      - 'dashboard/docker-compose.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/website/package-lock.json

      - name: Install dependencies
        working-directory: dashboard/website
        run: npm ci

      - name: Build Astro site
        working-directory: dashboard/website
        run: npm run build

      - name: SCP dist/ to prod VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'dashboard/website/dist/*'
          target: '/opt/docker/dashboard/website/dist'
          strip_components: 3

      - name: Reload nginx on prod VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec kecktech-web nginx -s reload
            echo "Prod deploy complete"