name: Deploy to Prod — kecktech.net

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Deploy to prod-dashboard-01 (VMID 230)
        shell: powershell
        run: |
          $sshExe = "C:\Program Files\Git\usr\bin\ssh.exe"
          $keyPath = "C:\Users\jonkd\.ssh\id_ed25519"
          $scriptPath = Join-Path $env:RUNNER_TEMP "deploy.sh"
          $scriptContent = "set -e`ncd /opt/docker/dashboard`necho '==> Pulling latest main branch...'`ngit pull origin main`necho '==> Installing website dependencies...'`ncd dashboard/website && npm ci --omit=dev && cd ../..`necho '==> Building Astro site...'`ncd dashboard/website && npm run build && cd ../..`necho '==> Rebuilding admin container...'`ncd dashboard && docker compose build kecktech-admin && cd ..`necho '==> Restarting containers...'`ncd dashboard && docker compose up -d kecktech-admin && cd ..`ndocker exec kecktech-web nginx -s reload 2>/dev/null || docker restart kecktech-web`necho '==> Deploy complete'"
          [System.IO.File]::WriteAllText($scriptPath, $scriptContent, (New-Object System.Text.UTF8Encoding $false))
          & $sshExe -o StrictHostKeyChecking=no -o BatchMode=yes -i $keyPath kecktech@10.20.0.143 "bash -s" < $scriptPath
          if ($LASTEXITCODE -ne 0) { throw "Deploy failed with exit code $LASTEXITCODE" }
          Remove-Item $scriptPath -Force -ErrorAction SilentlyContinue
