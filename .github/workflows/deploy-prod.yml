name: Deploy to Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type YES to confirm prod deploy
        required: true

jobs:
  deploy:
    runs-on: self-hosted
    if: github.event.inputs.confirm == 'YES'
    environment: production
    steps:
      - name: Deploy to prod-dashboard-01
        shell: powershell
        run: |
          & C:\actions-runner\deploy.ps1 -target "10.20.0.143" -branch "main"