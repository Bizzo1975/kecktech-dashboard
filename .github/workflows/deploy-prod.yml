name: Deploy to Prod — kecktech.net

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Deploy to prod-dashboard-01 (VMID 230)
        shell: powershell
        run: |
          $sshExe = "C:\Program Files\Git\usr\bin\ssh.exe"
          $keyPath = "C:\Users\jonkd\.ssh\id_ed25519"
          $script = "git config --global --add safe.directory /opt/docker && cd /opt/docker && git pull origin main && cd dashboard/website && npm ci --omit=dev && npm run build && cd ../.. && cd dashboard && docker compose build kecktech-admin && docker compose up -d kecktech-admin && docker compose restart kecktech-web && echo DEPLOY_SUCCESS"
          & $sshExe -o StrictHostKeyChecking=no -o BatchMode=yes -i $keyPath kecktech@10.20.0.143 $script
          if ($LASTEXITCODE -ne 0) { throw "Deploy failed with exit code $LASTEXITCODE" }
