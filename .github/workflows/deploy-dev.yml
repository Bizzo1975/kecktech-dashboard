name: Deploy to Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to dev-dashboard-01
        shell: powershell
        run: |
          $sshExe = "C:\Program Files\Git\usr\bin\ssh.exe"
          $keyPath = "C:\Users\jonkd\.ssh\deploy_key_fixed"
          $script = "set -euo pipefail; git config --global --add safe.directory /opt/docker; cd /opt/docker; git pull origin dev; cd dashboard/website; npm ci --omit=dev; npm run build; cd /opt/docker/dashboard; docker compose up -d kecktech-admin; docker compose restart kecktech-web; echo DEPLOY_OK"
          & $sshExe -o StrictHostKeyChecking=no -o BatchMode=yes -i $keyPath deploy@10.30.0.143 "bash -c '$script'"
          if ($LASTEXITCODE -ne 0) { throw "Deploy failed" }