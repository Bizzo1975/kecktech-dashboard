name: Deploy to Dev — kecktech.net

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to dev-dashboard-01 (VMID 730)
        shell: powershell
        run: |
          $sshExe = "C:\Program Files\Git\usr\bin\ssh.exe"
          $keyPath = "C:\Users\jonkd\.ssh\deploy_key_fixed"
          $script = "set -e && git config --global --add safe.directory /opt/docker && cd /opt/docker && git pull origin dev && cd dashboard/website && npm ci --omit=dev && npm run build && cd /opt/docker/dashboard && docker compose up -d kecktech-admin && docker compose restart kecktech-web && echo DEPLOY_SUCCESS"
          $output = & $sshExe -o StrictHostKeyChecking=no -o BatchMode=yes -i $keyPath deploy@10.30.0.143 $script 2>&1
          $output | Write-Host
          if ($output -match "DEPLOY_SUCCESS") { exit 0 } else { exit 1 }