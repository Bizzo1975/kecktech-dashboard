name: Deploy to Dev — kecktech.net

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to dev-dashboard-01 (VMID 730)
        shell: powershell
        run: |
          $sshExe = "C:\Program Files\Git\usr\bin\ssh.exe"
          $keyPath = "C:\Users\jonkd\.ssh\id_ed25519"
          $script = "set -e && cd /opt/docker/dashboard && echo '==> Pulling latest dev branch...' && git pull origin dev && echo '==> Installing website dependencies...' && cd dashboard/website && npm ci --omit=dev && cd ../.. && echo '==> Building Astro site...' && cd dashboard/website && npm run build && cd ../.. && echo '==> Rebuilding admin container...' && cd dashboard && docker compose build kecktech-admin && cd .. && echo '==> Restarting containers...' && cd dashboard && docker compose up -d kecktech-admin && cd .. && docker exec kecktech-web nginx -s reload && echo '==> Deploy complete'"
          & $sshExe -o StrictHostKeyChecking=no -o BatchMode=yes -i $keyPath kecktech@10.30.0.143 $script
          if ($LASTEXITCODE -ne 0) { throw "Deploy failed with exit code $LASTEXITCODE" }
