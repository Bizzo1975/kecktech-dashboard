name: Deploy to Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to dev-dashboard-01
        shell: pwsh
        run: |
          & powershell.exe -ExecutionPolicy Bypass -File "C:\actions-runner\deploy.ps1" -target "10.30.0.143" -branch "dev"
          if ($LASTEXITCODE -ne 0) { throw "Deploy failed with exit code $LASTEXITCODE" }
