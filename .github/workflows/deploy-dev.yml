name: Deploy to Dev — kecktech.net

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Write SSH key
        shell: powershell
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "deploy_key"
          [System.IO.File]::WriteAllText($keyPath, ($env:SSH_KEY -replace "`r`n","`n"))
          icacls $keyPath /inheritance:r /grant:r "${env:USERNAME}:(R)" | Out-Null

      - name: Deploy to dev-dashboard-01 (VMID 730)
        shell: powershell
        env:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "deploy_key"
          $script = @"
          set -e
          cd /opt/docker/dashboard
          echo '==> Pulling latest dev branch...'
          git pull origin dev
          echo '==> Installing website dependencies...'
          cd dashboard/website && npm ci --omit=dev && cd ../..
          echo '==> Building Astro site...'
          cd dashboard/website && npm run build && cd ../..
          echo '==> Rebuilding admin container...'
          cd dashboard && docker compose build kecktech-admin && cd ..
          echo '==> Restarting containers...'
          cd dashboard && docker compose up -d kecktech-admin && cd ..
          docker exec kecktech-web nginx -s reload 2>/dev/null || docker restart kecktech-web
          echo '==> Deploy complete'
          docker ps --format 'table {{.Names}}\t{{.Status}}' | grep kecktech
          "@
          $script | & ssh -o StrictHostKeyChecking=no -i $keyPath "$env:SSH_USER@$env:SSH_HOST" "bash -s"
          if ($LASTEXITCODE -ne 0) { throw "SSH deploy failed with exit code $LASTEXITCODE" }

      - name: Cleanup SSH key
        if: always()
        shell: powershell
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP "deploy_key"
          Remove-Item $keyPath -Force -ErrorAction SilentlyContinue
